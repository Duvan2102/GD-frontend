<div class="row mt-3 align-items-center" *ngIf="totalItems > 0">
  <div class="col-md-6">
    <span class="text-secondary">
      Mostrando {{ inicioRegistro }} a {{ finRegistro }} de {{ totalItems }} entradas
    </span>
  </div>

  <div class="col-md-6">
    <nav *ngIf="totalPaginas > 1">
      <ul class="pagination pagination-sm justify-content-end mb-0">
        <li class="page-item" [class.disabled]="paginaActual === 1">
          <a class="page-link" href="javascript:void(0);" (click)="cambiarAPagina(paginaActual - 1)">&laquo; Anterior</a>
        </li>
        <li class="page-item" *ngFor="let p of paginas" [class.active]="p === paginaActual">
          <a class="page-link" href="javascript:void(0);" (click)="cambiarAPagina(p)">{{ p }}</a>
        </li>
        <li class="page-item" [class.disabled]="paginaActual === totalPaginas">
          <a class="page-link" href="javascript:void(0);" (click)="cambiarAPagina(paginaActual + 1)">Siguiente &raquo;</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
